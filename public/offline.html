<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — SHABDA</title>
  <style>
    :root { --paper: #f4efe2; --ink: #1a1614; --accent: #b8341e; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 2rem; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 1rem; }
    .dev { color: var(--accent); margin-right: 4px; }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    p { color: #5c544d; font-size: 1rem; line-height: 1.6; max-width: 340px; }
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 10px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 2px;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div>
    <div class="logo"><span class="dev">श</span>Shabda</div>
    <h1>You're offline</h1>
    <p>No internet connection. Open a recently visited page or come back when you're connected.</p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
